[clusters.gilbreth]
partition = "gpu"
account = "my-lab-account"
gpu_type = "a100"
gpu_count = 1
sif_path = "/shared/containers/relaymd.sif"
wall_time = "4:00:00"

[clusters.anvil]
partition = "gpu-debug"
account = "my-project-account"
gpu_type = "a40"
gpu_count = 1
sif_path = "/anvil/projects/my-project/containers/relaymd.sif"
# Optional override; defaults to 4:00:00 in the template when omitted.
