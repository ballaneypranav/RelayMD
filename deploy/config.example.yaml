# Path to the SQLite database file. Use an absolute path on a stable filesystem.
database_url: sqlite+aiosqlite:////home/USER/relaymd/relaymd.db

# API token that workers and the CLI use to authenticate with the orchestrator.
# Can also be set via RELAYMD_API_TOKEN env var to keep it out of the file.
api_token: change-me

# Infisical bootstrap token injected into sbatch scripts for workers.
# Prefer setting this via INFISICAL_TOKEN env var.
infisical_token: ""

# Heartbeat timeout multiplier. A worker is considered stale after
# heartbeat_interval * heartbeat_timeout_multiplier seconds of silence.
heartbeat_timeout_multiplier: 2.0

# SLURM cluster definitions used for sbatch submission.
slurm_cluster_configs:
  - name: gilbreth-a30
    partition: a30
    account: my-lab-account
    gpu_type: a30
    gpu_count: 1
    sif_path: /depot/shared/containers/relaymd.sif
    wall_time: "4:00:00"
    max_pending_jobs: 1

# SaladCloud API key for autoscaling workers.
# Can be set via SALAD_API_KEY env var.
salad_api_key: null

# SaladCloud organization slug.
# Can be set via SALAD_ORG env var.
salad_org: null

# SaladCloud project slug.
# Can be set via SALAD_PROJECT env var.
salad_project: null

# SaladCloud container group name.
# Can be set via SALAD_CONTAINER_GROUP env var.
salad_container_group: null

# Maximum SaladCloud replicas for autoscaling.
# Can be set via SALAD_MAX_REPLICAS env var.
salad_max_replicas: 4

# CLI settings

# Orchestrator base URL for relaymd CLI commands.
orchestrator_url: http://localhost:8000

# B2 S3-compatible endpoint used by relaymd submit for direct bundle uploads.
b2_endpoint_url: https://s3.us-west-000.backblazeb2.com

# B2 bucket name for job bundles.
b2_bucket_name: relaymd-bucket

# B2 application key ID for uploads.
b2_access_key_id: your-key-id

# B2 application key secret for uploads.
b2_secret_access_key: your-secret

# Logging
relaymd_env: production        # development enables console renderer
relaymd_log_level: INFO
relaymd_log_format: auto       # auto | json | console
