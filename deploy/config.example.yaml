# Copy this file to either:
# - ~/.config/relaymd/config.yaml (user-global default)
# - ./relaymd-config.yaml (project-local override, gitignored)

# Path to the SQLite database file. Use an absolute path on a stable filesystem.
database_url: sqlite+aiosqlite:////home/USER/relaymd/relaymd.db

# API token that workers and the CLI use to authenticate with the orchestrator.
# Can also be set via RELAYMD_API_TOKEN env var to keep it out of the file.
api_token: change-me

# Infisical bootstrap token injected into sbatch scripts for workers.
# Prefer setting this via INFISICAL_TOKEN env var.
infisical_token: ""

# Tailscale settings for the orchestrator.
# tailscale_hostname is used as the stable MagicDNS name for this orchestrator
# node regardless of which login node it runs on.  Set RELAYMD_ORCHESTRATOR_URL
# in Infisical to http://<tailscale_hostname>:8000 so workers always resolve the
# current IP via DNS instead of a hardcoded address.
# tailscale_hostname: relaymd-orchestrator  # default; override via RELAYMD_TAILSCALE_HOSTNAME
# tailscale_socket: ~/.tailscale/tailscaled.sock  # default; set via RELAYMD_TAILSCALE_SOCKET
# tailscale_auth_key: ""  # set via TAILSCALE_AUTH_KEY or RELAYMD_TAILSCALE_AUTH_KEY

# Optional registry auth for Apptainer docker:// pulls (e.g. private GHCR).
# Can also be sourced from Infisical path /RelayMD as:
# - APPTAINER_DOCKER_USERNAME
# - APPTAINER_DOCKER_PASSWORD
apptainer_docker_username: ""
apptainer_docker_password: ""

# Worker heartbeats are expected at this cadence.
heartbeat_interval_seconds: 60

# Heartbeat timeout multiplier. A worker is considered stale after
# heartbeat_interval * heartbeat_timeout_multiplier seconds of silence.
heartbeat_timeout_multiplier: 2.0

# Orchestrator scheduler intervals.
stale_worker_reaper_interval_seconds: 60
orphaned_job_requeue_interval_seconds: 60
sbatch_submission_interval_seconds: 60

# Injected into sbatch as: #SBATCH --signal=TERM@<seconds>
slurm_sigterm_margin_seconds: 300

# Worker runtime defaults injected into sbatch environments.
worker_heartbeat_interval_seconds: 60
worker_checkpoint_poll_interval_seconds: 300
worker_orchestrator_timeout_seconds: 30.0
worker_sigterm_checkpoint_wait_seconds: 60
worker_sigterm_checkpoint_poll_seconds: 2
worker_sigterm_process_wait_seconds: 10
# When no jobs are available, workers can either exit immediately or poll for a set duration.
worker_idle_strategy: "immediate_exit"  # options: "immediate_exit", "poll_then_exit"
worker_idle_poll_interval_seconds: 30
worker_idle_poll_max_seconds: 600

# SLURM cluster definitions used for sbatch submission.
slurm_cluster_configs:
  - name: gilbreth-a30
    partition: a30
    account: my-lab-account
    ssh_host: gilbreth.rcac.purdue.edu
    ssh_username: my-username
    # ssh_key_file: /home/local-user/.ssh/id_rsa
    # ssh_port: 22
    gpu_type: a30
    gpu_count: 1
    # Provisioning strategy (reactive | continuous | jit_threshold):
    # - reactive: submits only if no workers are active
    # - continuous: submits up to max_pending_jobs at all times if jobs are queued
    # - jit_threshold: submits like reactive but ONLY if the oldest queued job has waited > jit_threshold_hours
    strategy: "reactive"
    # jit_threshold_hours: 6.0
    # Choose exactly one image source:
    # 1) shared Apptainer image path (best for offline/restricted compute nodes)
    sif_path: /depot/shared/containers/relaymd.sif
    # 2) OR direct registry image (Apptainer uses docker://<image>)
    # Prefer a SHA tag over :latest to pin to a specific build.
    # The SHA tag is printed in the GitHub Actions job summary after each CI run.
    # image_uri: ghcr.io/<org>/relaymd-worker:sha-abc1234
    # image_uri: ghcr.io/<org>/relaymd-worker:latest
    # Optional scheduler directives:
    # nodes: 1
    # ntasks: 8
    # qos: standby
    # gres: gpu:1      # override default gpu:<gpu_type>:<gpu_count>
    # Optional SLURM memory directives (set at most one):
    # memory: 60G          # renders: #SBATCH --mem=60G
    # memory_per_gpu: 60G  # renders: #SBATCH --mem-per-gpu=60G
    wall_time: "4:00:00"
    max_pending_jobs: 1
    # log_directory: /scratch/gilbreth/my-username/relaymd-logs

# SaladCloud API key for autoscaling workers.
# Can be set via SALAD_API_KEY env var.
salad_api_key: null

# SaladCloud organization slug.
# Can be set via SALAD_ORG env var.
salad_org: null

# SaladCloud project slug.
# Can be set via SALAD_PROJECT env var.
salad_project: null

# SaladCloud container group name.
# Can be set via SALAD_CONTAINER_GROUP env var.
salad_container_group: null

# Maximum SaladCloud replicas for autoscaling.
# Can be set via SALAD_MAX_REPLICAS env var.
salad_max_replicas: 4

# Timeout for SaladCloud API requests.
# Can be set via SALAD_API_TIMEOUT_SECONDS env var.
salad_api_timeout_seconds: 10.0

# CLI settings

# Orchestrator base URL for relaymd CLI commands.
orchestrator_url: http://localhost:8000

# B2 S3-compatible endpoint used by relaymd submit for direct bundle uploads.
b2_endpoint_url: https://s3.us-west-000.backblazeb2.com

# B2 bucket name for job bundles.
b2_bucket_name: relaymd-bucket

# B2 application key ID for uploads.
b2_access_key_id: your-key-id

# B2 application key secret for uploads.
b2_secret_access_key: your-secret

# Cloudflare Worker URL used by relaymd storage downloads.
cf_worker_url: https://cloudflare-backblaze-worker.pranav-purdue-account.workers.dev

# Optional bearer token for Cloudflare Worker downloads.
cf_bearer_token: ""

# Timeout for CLI requests to the orchestrator API.
# Can be set via ORCHESTRATOR_TIMEOUT_SECONDS env var.
orchestrator_timeout_seconds: 30.0

# Logging
relaymd_env: production        # development enables console renderer
relaymd_log_level: INFO
relaymd_log_format: auto       # auto | json | console
