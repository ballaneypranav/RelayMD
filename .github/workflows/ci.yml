name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      worker_base_image: ${{ steps.filter.outputs.worker_base_image }}
      orchestrator_base_image: ${{ steps.filter.outputs.orchestrator_base_image }}
      worker_image: ${{ steps.filter.outputs.worker_image }}
      orchestrator_image: ${{ steps.filter.outputs.orchestrator_image }}
      cli: ${{ steps.filter.outputs.cli }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - 'packages/**'
              - 'tests/**'
              - 'frontend/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'scripts/sync_workspace.sh'
            worker_base_image:
              - 'Dockerfile.worker-base'
              - '.github/workflows/ci.yml'
            orchestrator_base_image:
              - 'Dockerfile.orchestrator-base'
              - '.github/workflows/ci.yml'
            worker_image:
              - 'Dockerfile'
              - 'Dockerfile.worker-base'
              - 'packages/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'scripts/sync_workspace.sh'
              - '.github/workflows/ci.yml'
            orchestrator_image:
              - 'Dockerfile.orchestrator-base'
              - 'Dockerfile.orchestrator'
              - 'frontend/**'
              - 'src/**'
              - 'packages/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'scripts/sync_workspace.sh'
              - '.github/workflows/ci.yml'
            cli:
              - 'src/relaymd/**'
              - 'packages/relaymd-core/**'
              - 'packages/relaymd-api-client/**'
              - 'relaymd-cli.spec'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'scripts/sync_workspace.sh'
              - '.github/workflows/ci.yml'

  test:
    needs: changes
    permissions:
      contents: read
      pull-requests: write
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
      - run: ./scripts/sync_workspace.sh
      - run: uv run pytest
      - name: Upload coverage report
        if: '!cancelled()'
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage.xml
      - name: Coverage comment
        if: github.event_name == 'pull_request'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cli-version-guard:
    needs: changes
    permissions:
      contents: read
    if: ${{ (github.event_name == 'pull_request' || github.event_name == 'push') && needs.changes.outputs.cli == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Require CLI version bump
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -euo pipefail
          current_version="$(sed -n 's/^version = "\(.*\)"/\1/p' pyproject.toml | head -n 1)"
          base_version="$(git show "${BASE_SHA}:pyproject.toml" | sed -n 's/^version = "\(.*\)"/\1/p' | head -n 1)"

          if [[ -z "${current_version}" || -z "${base_version}" ]]; then
            echo "Unable to read RelayMD version from pyproject.toml." >&2
            exit 1
          fi

          if [[ "${current_version}" == "${base_version}" ]]; then
            echo "CLI-affecting files changed, but pyproject.toml version is still ${current_version}." >&2
            echo "Run: make release-cli VERSION=<next-semver>" >&2
            exit 1
          fi

  build-worker-base:
    needs: [changes]
    permissions:
      contents: read
      packages: write
    if: ${{ !cancelled() && needs.changes.outputs.worker_base_image == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/relaymd-worker-base
          tags: |
            type=raw,value=latest
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          file: Dockerfile.worker-base
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=worker-base
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/relaymd-worker-base:latest
          cache-to: type=gha,mode=max,scope=worker-base
          provenance: false

  build-orchestrator-base:
    needs: [changes]
    permissions:
      contents: read
      packages: write
    if: ${{ !cancelled() && needs.changes.outputs.orchestrator_base_image == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/relaymd-orchestrator-base
          tags: |
            type=raw,value=latest
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          file: Dockerfile.orchestrator-base
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=orchestrator-base
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/relaymd-orchestrator-base:latest
          cache-to: type=gha,mode=max,scope=orchestrator-base
          provenance: false

  build-worker:
    needs: [changes, build-worker-base]
    permissions:
      contents: read
      packages: write
    if: ${{ !cancelled() && needs.changes.outputs.worker_image == 'true' && (needs.build-worker-base.result == 'success' || needs.build-worker-base.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
      - run: ./scripts/generate_api_client.sh
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/relaymd-worker
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest
      - uses: docker/setup-buildx-action@v4
      - name: Select worker base image
        id: worker-base
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ needs.changes.outputs.worker_base_image }}" == "true" ]]; then
            echo "base_image=relaymd-worker-base:ci" >> "$GITHUB_OUTPUT"
          else
            echo "base_image=ghcr.io/${{ github.repository_owner }}/relaymd-worker-base:latest" >> "$GITHUB_OUTPUT"
          fi
      - name: Build worker base locally (PR)
        if: ${{ github.event_name == 'pull_request' && needs.changes.outputs.worker_base_image == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.worker-base
          load: true
          tags: relaymd-worker-base:ci
          cache-from: |
            type=gha,scope=worker-base
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/relaymd-worker-base:latest
          cache-to: type=gha,mode=max,scope=worker-base
          provenance: false
      - name: Build worker image (PR)
        if: ${{ github.event_name == 'pull_request' && needs.changes.outputs.worker_base_image == 'true' }}
        run: |
          docker build \
            --build-arg BASE_IMAGE=relaymd-worker-base:ci \
            -t relaymd-worker:ci \
            .
      - name: Build worker image with cache (PR)
        if: ${{ github.event_name == 'pull_request' && needs.changes.outputs.worker_base_image != 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          build-args: |
            BASE_IMAGE=${{ steps.worker-base.outputs.base_image }}
          cache-from: |
            type=gha,scope=worker
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/relaymd-worker:latest
          cache-to: type=gha,mode=max,scope=worker
          provenance: false
      - uses: docker/build-push-action@v7
        id: build
        if: ${{ github.event_name != 'pull_request' }}
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ steps.worker-base.outputs.base_image }}
          cache-from: |
            type=gha,scope=worker
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/relaymd-worker:latest
          cache-to: type=gha,mode=max,scope=worker
          provenance: false
      - name: Summary
        run: |
          echo "### Worker image" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Pin a cluster to this build in \`relaymd-config.yaml\`:" >> $GITHUB_STEP_SUMMARY
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "\`image_uri: ghcr.io/${{ github.repository_owner }}/relaymd-worker:sha-${SHORT_SHA}\`" >> $GITHUB_STEP_SUMMARY

  build-orchestrator:
    needs: [changes, build-orchestrator-base]
    permissions:
      contents: read
      packages: write
    if: ${{ !cancelled() && needs.changes.outputs.orchestrator_image == 'true' && (needs.build-orchestrator-base.result == 'success' || needs.build-orchestrator-base.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
      - run: ./scripts/generate_api_client.sh
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/relaymd-orchestrator
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest
      - uses: docker/setup-buildx-action@v4
      - name: Build orchestrator base locally (PR)
        if: ${{ github.event_name == 'pull_request' && needs.changes.outputs.orchestrator_base_image == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.orchestrator-base
          load: true
          tags: relaymd-orchestrator-base:ci
          cache-from: |
            type=gha,scope=orchestrator-base
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/relaymd-orchestrator-base:latest
          cache-to: type=gha,mode=max,scope=orchestrator-base
          provenance: false
      - name: Select orchestrator base image
        id: orchestrator-base
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ needs.changes.outputs.orchestrator_base_image }}" == "true" ]]; then
            echo "base_image=relaymd-orchestrator-base:ci" >> "$GITHUB_OUTPUT"
          else
            echo "base_image=ghcr.io/${{ github.repository_owner }}/relaymd-orchestrator-base:latest" >> "$GITHUB_OUTPUT"
          fi
      - name: Build orchestrator image locally (PR)
        if: ${{ github.event_name == 'pull_request' && needs.changes.outputs.orchestrator_base_image == 'true' }}
        run: |
          docker build \
            -f Dockerfile.orchestrator \
            --build-arg BASE_IMAGE=relaymd-orchestrator-base:ci \
            -t relaymd-orchestrator:ci \
            .
      - name: Build orchestrator image with cache (PR)
        if: ${{ github.event_name == 'pull_request' && needs.changes.outputs.orchestrator_base_image != 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.orchestrator
          load: true
          tags: relaymd-orchestrator:ci
          build-args: |
            BASE_IMAGE=${{ steps.orchestrator-base.outputs.base_image }}
          cache-from: |
            type=gha,scope=orchestrator
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/relaymd-orchestrator:latest
          cache-to: type=gha,mode=max,scope=orchestrator
          provenance: false
      - uses: docker/build-push-action@v7
        id: build
        if: ${{ github.event_name != 'pull_request' }}
        with:
          context: .
          file: Dockerfile.orchestrator
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ steps.orchestrator-base.outputs.base_image }}
          cache-from: |
            type=gha,scope=orchestrator
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/relaymd-orchestrator:latest
          cache-to: type=gha,mode=max,scope=orchestrator
          provenance: false
      - name: Smoke test orchestrator frontend serving
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          docker run --rm --entrypoint python relaymd-orchestrator:ci - <<'PY'
          import asyncio
          import shutil
          import infisical_client
          import relaymd_api_client
          from httpx import ASGITransport, AsyncClient
          from relaymd.orchestrator.config import OrchestratorSettings
          from relaymd.orchestrator.main import create_app

          _ = infisical_client
          _ = relaymd_api_client
          assert shutil.which("relaymd-orchestrator"), "relaymd-orchestrator entrypoint missing from image"
          assert shutil.which("relaymd-dashboard-proxy"), "relaymd-dashboard-proxy entrypoint missing from image"
          assert shutil.which("ssh"), "ssh binary missing from orchestrator image"
          assert shutil.which("tailscale"), "tailscale binary missing from orchestrator image"
          assert shutil.which("tailscaled"), "tailscaled binary missing from orchestrator image"

          async def main() -> None:
              settings = OrchestratorSettings(
                  axiom_token="test",
                  database_url="sqlite+aiosqlite:///:memory:",
                  api_token="test-token",
              )
              app = create_app(settings, start_background_tasks=False)
              async with app.router.lifespan_context(app):
                  transport = ASGITransport(app=app)
                  async with AsyncClient(transport=transport, base_url="http://test") as client:
                      response = await client.get("/")
                  assert response.status_code == 200, response.text[:200]

          asyncio.run(main())
          PY
      - name: Summary
        run: |
          DIGEST="${{ steps.build.outputs.digest }}"
          if [ -z "${DIGEST}" ]; then
            DIGEST="not-pushed (pull_request)"
          fi
          echo "### Orchestrator image" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${DIGEST}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "Pin orchestrator deployment to this immutable tag:" >> $GITHUB_STEP_SUMMARY
          echo "\`image_uri: ghcr.io/${{ github.repository_owner }}/relaymd-orchestrator:sha-${SHORT_SHA}\`" >> $GITHUB_STEP_SUMMARY

  build-cli:
    needs: [changes]
    permissions:
      contents: write
    if: ${{ !cancelled() && needs.changes.outputs.cli == 'true' }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
      - run: ./scripts/sync_workspace.sh
      - run: ./scripts/build_cli_binary.sh
      - id: cli_sha
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Rename binary
        run: mv dist/relaymd dist/relaymd-linux-x86_64
      - name: Upload immutable CLI release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: sha-${{ steps.cli_sha.outputs.short_sha }}
          name: sha-${{ steps.cli_sha.outputs.short_sha }}
          prerelease: false
          make_latest: false
          files: dist/relaymd-linux-x86_64
      - name: Upload to GitHub Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: Latest
          prerelease: false
          make_latest: true
          files: dist/relaymd-linux-x86_64

  build-sif:
    needs: [changes, build-worker, build-orchestrator]
    permissions:
      contents: write
      packages: read
    if: ${{ github.event_name != 'pull_request' && !cancelled() && (needs.changes.outputs.worker_image == 'true' || needs.changes.outputs.orchestrator_image == 'true') && (needs.build-worker.result == 'success' || needs.build-worker.result == 'skipped') && (needs.build-orchestrator.result == 'success' || needs.build-orchestrator.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /opt/ghc /usr/share/dotnet || true
          df -h
      - uses: eWaterCycle/setup-apptainer@v2
        with:
          apptainer-version: 1.3.3
      - name: Get short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Build orchestrator SIF
        if: ${{ needs.changes.outputs.orchestrator_image == 'true' }}
        env:
          APPTAINER_DOCKER_USERNAME: ${{ github.actor }}
          APPTAINER_DOCKER_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: apptainer pull relaymd-orchestrator.sif "docker://ghcr.io/${{ github.repository_owner }}/relaymd-orchestrator:sha-${{ steps.sha.outputs.short }}"
      - name: Build worker SIF
        if: ${{ needs.changes.outputs.worker_image == 'true' }}
        env:
          APPTAINER_DOCKER_USERNAME: ${{ github.actor }}
          APPTAINER_DOCKER_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: apptainer pull relaymd-worker.sif "docker://ghcr.io/${{ github.repository_owner }}/relaymd-worker:sha-${{ steps.sha.outputs.short }}"
      - name: Upload SIF files to immutable release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: sha-${{ steps.sha.outputs.short }}
          name: sha-${{ steps.sha.outputs.short }}
          prerelease: false
          make_latest: false
          files: "*.sif"

  publish-release-manifest:
    needs: [changes, test, cli-version-guard, build-worker, build-orchestrator, build-cli, build-sif]
    permissions:
      contents: write
    if: ${{ github.event_name != 'pull_request' && !cancelled() && (needs.test.result == 'success' || needs.test.result == 'skipped') && (needs.cli-version-guard.result == 'success' || needs.cli-version-guard.result == 'skipped') && (needs.build-worker.result == 'success' || needs.build-worker.result == 'skipped') && (needs.build-orchestrator.result == 'success' || needs.build-orchestrator.result == 'skipped') && (needs.build-cli.result == 'success' || needs.build-cli.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Generate release manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
          SOURCE_SHA: ${{ github.sha }}
          WORKER_CHANGED: ${{ needs.changes.outputs.worker_image }}
          ORCH_CHANGED: ${{ needs.changes.outputs.orchestrator_image }}
          CLI_CHANGED: ${{ needs.changes.outputs.cli }}
        run: |
          set -euo pipefail
          short_sha="${SOURCE_SHA:0:7}"
          prev_manifest="$(mktemp)"
          release_json="$(mktemp)"
          echo '{}' > "${prev_manifest}"

          if gh api "/repos/${REPO}/releases/tags/latest" > "${release_json}" 2>/dev/null; then
            manifest_asset_url="$(jq -r '.assets[]? | select(.name=="relaymd-release-manifest.json") | .url' "${release_json}")"
            if [[ -n "${manifest_asset_url}" ]]; then
              gh api -H "Accept: application/octet-stream" "${manifest_asset_url}" > "${prev_manifest}"
            fi
          fi

          prev_release_version="$(jq -r '.release_version // empty' "${prev_manifest}")"
          prev_worker_image="$(jq -r '.worker_image // empty' "${prev_manifest}")"
          prev_orch_image="$(jq -r '.orchestrator_image // empty' "${prev_manifest}")"
          prev_cli_uri="$(jq -r '.cli_uri // empty' "${prev_manifest}")"
          prev_cli_version="$(jq -r '.cli_version // empty' "${prev_manifest}")"
          current_cli_version="$(sed -n 's/^version = "\(.*\)"/\1/p' pyproject.toml | head -n 1)"

          if [[ -z "${current_cli_version}" ]]; then
            echo "Unable to read RelayMD CLI version from pyproject.toml." >&2
            exit 1
          fi

          if [[ "${WORKER_CHANGED}" == "true" ]]; then
            worker_image="docker://ghcr.io/${OWNER}/relaymd-worker:sha-${short_sha}"
          else
            worker_image="${prev_worker_image:-docker://ghcr.io/${OWNER}/relaymd-worker:latest}"
          fi

          if [[ "${ORCH_CHANGED}" == "true" ]]; then
            orchestrator_image="docker://ghcr.io/${OWNER}/relaymd-orchestrator:sha-${short_sha}"
          else
            orchestrator_image="${prev_orch_image:-docker://ghcr.io/${OWNER}/relaymd-orchestrator:latest}"
          fi

          if [[ "${CLI_CHANGED}" == "true" ]]; then
            cli_uri="https://github.com/${OWNER}/relaymd/releases/download/sha-${short_sha}/relaymd-linux-x86_64"
            cli_version="${current_cli_version}"
          else
            cli_uri="${prev_cli_uri:-https://github.com/${OWNER}/relaymd/releases/latest/download/relaymd-linux-x86_64}"
            cli_version="${prev_cli_version:-${current_cli_version}}"
          fi

          if [[ "${WORKER_CHANGED}" == "true" || "${ORCH_CHANGED}" == "true" || "${CLI_CHANGED}" == "true" ]]; then
            release_version="sha-${short_sha}"
          else
            release_version="${prev_release_version:-sha-${short_sha}}"
          fi

          jq -n \
            --arg release_version "${release_version}" \
            --arg orchestrator_image "${orchestrator_image}" \
            --arg worker_image "${worker_image}" \
            --arg cli_uri "${cli_uri}" \
            --arg cli_version "${cli_version}" \
            --arg source_commit "${SOURCE_SHA}" \
            --arg generated_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              release_version: $release_version,
              orchestrator_image: $orchestrator_image,
              worker_image: $worker_image,
              cli_uri: $cli_uri,
              cli_version: $cli_version,
              source_commit: $source_commit,
              generated_at: $generated_at
            }' > relaymd-release-manifest.json

      - name: Upload release manifest
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: Latest
          prerelease: false
          make_latest: true
          files: relaymd-release-manifest.json
