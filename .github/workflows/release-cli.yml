name: Release CLI
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-linux-binary:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --dev
      - run: uv run pyinstaller relaymd.spec
      - name: Rename binary
        run: mv dist/relaymd dist/relaymd-linux-x86_64
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/relaymd-linux-x86_64

  publish-pypi:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Build relaymd wheel and sdist
        run: uv build . --out-dir dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
