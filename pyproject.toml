[tool.uv.workspace]
members = [
    "packages/relaymd-models",
    "packages/relaymd-storage",
    "packages/relaymd-worker",
    "packages/relaymd-orchestrator",
    "packages/relaymd-cli",
]

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-asyncio",
    "httpx",
    "respx",
    "moto[s3]",
    "freezegun",
    "ruff",
    "pyright",
    "pyinstaller",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.pytest.ini_options]
pythonpath = [
    "packages/relaymd-models/src",
    "packages/relaymd-storage/src",
    "packages/relaymd-worker/src",
    "packages/relaymd-orchestrator/src",
    "packages/relaymd-cli/src",
]

[tool.pyright]
pythonVersion = "3.11"
typeCheckingMode = "standard"
extraPaths = [
    "packages/relaymd-models/src",
    "packages/relaymd-storage/src",
    "packages/relaymd-orchestrator/src",
    "packages/relaymd-worker/src",
    "packages/relaymd-cli/src",
]
