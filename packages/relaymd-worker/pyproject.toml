[project]
name = "relaymd-worker"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "relaymd-models",
    "relaymd-storage",
    "pydantic-settings>=2.0",
    "infisical-python",
    "pynvml",
    "structlog",
]

[project.scripts]
relaymd-worker = "relaymd.worker.__main__:main"

[tool.uv.sources]
relaymd-models = { workspace = true }
relaymd-storage = { workspace = true }
