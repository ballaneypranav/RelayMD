[project]
name = "relaymd-worker"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "relaymd-core",
    "infisical-python>=2.0,<2.2",
    "httpx",
    "pydantic-settings>=2.0",
    "pynvml",
    "orjson",
    "structlog",
    "tenacity>=8.2",
]

[project.scripts]
relaymd-worker = "relaymd.worker.__main__:main"

[tool.uv.sources]
relaymd-core = { workspace = true }

[tool.pytest.ini_options]
pythonpath = ["src"]
