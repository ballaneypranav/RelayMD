[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "relaymd-api-client"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.24.1",
    "pydantic>=2.0",
]

[tool.pytest.ini_options]
pythonpath = ["src"]

[tool.hatch.build.targets.wheel]
packages = ["src/relaymd_api_client"]
