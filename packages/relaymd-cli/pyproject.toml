[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "relaymd-cli"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "boto3",
    "httpx",
    "typer",
    "rich",
    "pydantic-settings[yaml]",
    "pyyaml",
]

[project.scripts]
relaymd = "relaymd.cli.__main__:app"

[tool.pytest.ini_options]
pythonpath = ["src"]

[tool.hatch.build.targets.wheel]
packages = ["src/relaymd"]
