[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "relaymd-orchestrator"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "relaymd-models",
    "relaymd-storage",
    "fastapi>=0.111",
    "uvicorn[standard]",
    "sqlmodel>=0.0.18",
    "aiosqlite",
    "alembic",
    "pydantic-settings[yaml]>=2.0",
    "orjson",
    "structlog",
    "jinja2",
    "httpx",
]

[project.scripts]
relaymd-orchestrator = "relaymd.orchestrator.main:start"

[tool.uv.sources]
relaymd-models = { workspace = true }
relaymd-storage = { workspace = true }

[tool.pytest.ini_options]
pythonpath = ["src"]

[tool.hatch.build.targets.wheel]
packages = ["src/relaymd"]
