[project]
name = "relaymd-orchestrator"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "relaymd-models",
    "relaymd-storage",
    "fastapi>=0.111",
    "uvicorn[standard]",
    "sqlmodel>=0.0.18",
    "aiosqlite",
    "alembic",
    "pydantic-settings>=2.0",
    "structlog",
    "jinja2",
    "httpx",
]

[tool.uv.sources]
relaymd-models = { workspace = true }
relaymd-storage = { workspace = true }

[tool.pytest.ini_options]
pythonpath = ["src"]
