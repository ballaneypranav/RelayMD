[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "relaymd-core"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
    "sqlmodel>=0.0.18",
    "boto3",
    "httpx",
    "tenacity>=8.2",
]

[tool.pytest.ini_options]
pythonpath = ["src"]

[tool.hatch.build.targets.wheel]
packages = ["src/relaymd"]
